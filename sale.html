<style>
:root{
  --bg:#f4f3ee;--bg-alt:#eae8e1;--ink:#0e0e0e;--ink-60:#555;--ink-40:#8a8a86;
  --line:#d8d6cc;--mint:#dff6cf;--pink:#ffc8a5;--red:#c0392b;
  --font-sans:"Helvetica Now Display","Neue Haas Grotesk Display Pro","Helvetica Neue",Helvetica,"Inter",-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  --font-mono:"JetBrains Mono","IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font-sans);color:var(--ink);background:var(--bg)}
header{padding:22px 18px 14px;text-align:center;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:20}
header h1{margin:0;font-size:20px;letter-spacing:.2em;font-weight:800}
header .sub{margin:5px 0 0;color:var(--ink-60);font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
#cartBtn{position:absolute;right:14px;top:18px;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:12px;font-family:var(--font-mono);letter-spacing:.06em;cursor:pointer}
#cartBtn b{background:var(--pink);color:var(--ink);border-radius:8px;padding:0 6px;margin-left:7px}
.note{max-width:1180px;margin:14px auto 0;padding:9px 14px;background:#fff;border:1px solid var(--line);border-radius:10px;color:var(--ink-60);font-family:var(--font-mono);font-size:11px;line-height:1.6;letter-spacing:.02em}
.wrap{max-width:1180px;margin:22px auto 70px;padding:0 clamp(14px,3vw,40px)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(12px,2vw,26px)}
@media(max-width:980px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{display:flex;flex-direction:column;background:transparent;position:relative}
.card-img{aspect-ratio:4/5;border-radius:12px;overflow:hidden;background:var(--bg-alt);position:relative;margin-bottom:13px;cursor:pointer;padding:10px}
.card-img img{width:100%;height:100%;object-fit:contain;transition:transform .7s cubic-bezier(.2,.8,.2,1)}
.card:hover .card-img img{transform:scale(1.05)}
.badge{position:absolute;top:12px;left:12px;z-index:2;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:4px 8px;border-radius:4px;background:var(--pink);color:var(--ink)}
.badge.new{background:var(--mint)}
.badge.sold{background:#c0392b;color:#fff}
.card.sold .card-img img{filter:grayscale(1);opacity:.82}
.card.sold .card-price,.card.sold .card-sz,.card.sold .card-szl{opacity:.5}
.mbuy.sold{background:#c0392b;cursor:not-allowed}
.card-quick{position:absolute;right:12px;bottom:12px;width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;transform:translateY(8px);opacity:0;transition:.25s;box-shadow:0 4px 12px rgba(0,0,0,.12);pointer-events:none}
.card-quick svg{width:15px;height:15px;fill:none;stroke:var(--ink);stroke-width:2}
.card:hover .card-quick{transform:translateY(0);opacity:1}
.card-name{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:-.01em;line-height:1.2;margin-bottom:3px}
.card-sku{font-family:var(--font-mono);font-size:10px;color:var(--ink-40);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.card-price{font-size:13px;font-weight:700;font-family:var(--font-mono);margin-bottom:10px}
.card-price s{color:var(--ink-40);font-weight:400;margin-right:6px;font-size:11px}
.card-price .pct{color:var(--red);margin-left:6px}
.card-szl{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40);margin-bottom:5px}
.card-sz{display:flex;flex-wrap:wrap;gap:5px}
.card-sz span{border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ink-60);background:#fff}
.sz{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.sz button{border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 9px;font-size:12px;font-weight:600;font-family:var(--font-mono);cursor:pointer}
.sz button.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.add{margin-top:auto;background:var(--ink);color:#fff;border:none;border-radius:9px;padding:11px;font-weight:700;font-size:12px;font-family:var(--font-mono);letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.add:active{transform:translateY(1px)}
.modal{position:fixed;inset:0;z-index:70;display:none}
.modal.on{display:block}
.mback{position:absolute;inset:0;background:rgba(14,14,14,.55)}
.mpanel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(1040px,94vw);max-height:92vh;background:var(--bg);border-radius:18px;overflow:auto;display:grid;grid-template-columns:1fr 1fr}
@media(max-width:820px){.mpanel{grid-template-columns:1fr;width:96vw}}
.mx{position:absolute;right:14px;top:14px;z-index:6;width:38px;height:38px;border-radius:50%;border:none;background:#fff;font-size:22px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.mgal{position:relative;background:var(--bg-alt);min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px}
.vbadge{position:absolute;top:16px;left:16px;background:#3a3a3a;color:#cfff5a;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;padding:5px 10px;border-radius:20px;display:none;z-index:3}
.gstage{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-height:62vh}
.gstage img,.gstage video{max-width:100%;max-height:60vh;object-fit:contain;border-radius:8px}
.gstage iframe{width:min(80%,360px);height:min(60vh,640px);border:0;border-radius:10px;background:#000}
.gnav{position:absolute;top:46%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;border:none;background:#fff;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:3}
.gnav.prev{left:14px}.gnav.next{right:14px}
.gcount{position:absolute;bottom:86px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-family:var(--font-mono);font-size:11px;padding:3px 10px;border-radius:20px}
.gthumbs{display:flex;gap:8px;overflow:auto;width:100%;padding-top:12px}
.gthumbs button{flex:0 0 auto;width:58px;height:58px;border-radius:10px;border:1px solid var(--line);overflow:hidden;background:#fff;cursor:pointer;padding:0}
.gthumbs button.sel{border-color:var(--ink)}
.gthumbs img{width:100%;height:100%;object-fit:cover}
.minfo{padding:30px 32px 28px;position:relative}
.meye{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink-60);text-transform:uppercase;margin-bottom:10px}
.mtitle{margin:0;font-size:30px;font-weight:800;text-transform:uppercase;letter-spacing:-.02em;line-height:1}
.msku{font-family:var(--font-mono);font-size:11px;color:var(--ink-40);letter-spacing:.06em;margin:8px 0 18px}
.mpbox{background:var(--bg-alt);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.mp-cur{font-size:26px;font-weight:800}
.mp-old{color:var(--ink-40);text-decoration:line-through;font-size:15px}
.mp-pct{margin-left:auto;background:var(--pink);color:var(--ink);font-family:var(--font-mono);font-size:12px;font-weight:700;padding:4px 9px;border-radius:6px}
.msz-h{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;color:var(--ink-60);margin-bottom:10px}
.mszs{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:22px}
.mszs button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px 0;text-align:center;cursor:pointer;font-weight:700;font-size:15px}
.mszs button small{display:block;font-family:var(--font-mono);font-size:10px;color:var(--ink-40);font-weight:400;margin-top:3px}
.mszs button.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.mszs button.sel small{color:#cfcfcf}
.mbuy{width:100%;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:16px;font-weight:700;font-family:var(--font-mono);letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.mspec{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}
.mspec .spec-h{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60);margin:0 0 8px}
.mspec ul{margin:0 0 16px;padding-left:18px}
.mspec li{font-size:13px;line-height:1.55;margin-bottom:3px}
.lb{position:fixed;inset:0;background:rgba(10,10,10,.92);display:none;align-items:center;justify-content:center;z-index:80;cursor:zoom-out;padding:20px}
.lb.on{display:flex}
.lb .x{position:absolute;top:14px;right:18px;color:#fff;font-size:30px;line-height:1;cursor:pointer;z-index:3}
.lb .stage{max-width:96vw;max-height:84vh;display:flex;align-items:center;justify-content:center}
.lb .stage img,.lb .stage video{max-width:96vw;max-height:84vh;object-fit:contain;border-radius:10px;background:#000}
.lb .stage iframe{width:min(92vw,440px);height:min(84vh,780px);border:0;border-radius:10px;background:#000}
.lb .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.16);color:#fff;border:none;font-size:22px;width:46px;height:46px;border-radius:50%;cursor:pointer;z-index:3}
.lb .nav.prev{left:12px}.lb .nav.next{right:12px}
.lb .count{position:absolute;top:16px;left:0;right:0;text-align:center;color:#fff;font-family:var(--font-mono);font-size:12px}
.lb .cap{position:absolute;bottom:18px;left:0;right:0;text-align:center;color:#fff;font-size:13px;font-weight:600}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.25s;z-index:40}
.ov.on{opacity:1;pointer-events:auto}
.drw{position:fixed;top:0;right:0;height:100%;width:min(420px,100%);background:var(--bg);transform:translateX(100%);transition:.3s;z-index:50;display:flex;flex-direction:column}
.drw.on{transform:none}
.drw h3{margin:0;padding:16px;border-bottom:1px solid var(--line);font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.drw>.x{position:absolute;right:12px;top:13px;border:none;background:none;font-size:22px;cursor:pointer;line-height:1}
.cl-list{flex:1;overflow:auto;padding:12px 16px}
.ci{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.ci img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--bg-alt)}
.ci .t{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:-.01em}

.ci .p{font-size:13px;font-weight:700;font-family:var(--font-mono)}
.ci .rm{border:none;background:none;color:var(--ink-40);font-size:11px;cursor:pointer;text-decoration:underline;font-family:var(--font-mono);padding:4px 0 0}
.foot{border-top:1px solid var(--line);padding:14px 16px;background:var(--bg)}
.foot .row{display:flex;justify-content:space-between;font-weight:800;font-size:15px;font-family:var(--font-mono);margin-bottom:10px}
.foot input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin-bottom:9px;background:#fff;font-family:var(--font-sans)}
.pm{display:flex;gap:8px;margin-bottom:10px}
.pm label{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px;text-align:center;font-size:12px;font-weight:600;font-family:var(--font-mono);cursor:pointer;background:#fff}
.pm input{display:none}
.pm label:has(input:checked){border-color:var(--ink);background:var(--ink);color:#fff}
.go{width:100%;background:var(--ink);color:#fff;border:none;border-radius:11px;padding:14px;font-weight:700;font-size:13px;font-family:var(--font-mono);letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
.go:disabled{background:#999}
.err{color:var(--red);font-size:12px;margin-bottom:8px;min-height:1px}
.ac{position:relative}
.acbox{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--line);border-radius:9px;max-height:200px;overflow:auto;z-index:5;display:none}
.acbox div{padding:9px 11px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.acbox div:hover{background:var(--bg-alt)}
.empty{color:var(--ink-40);text-align:center;padding:30px 0;font-family:var(--font-mono);font-size:12px}
footer{text-align:center;color:var(--ink-40);font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;padding:0 14px 40px}

const CM={'36':'23.5','37':'24','38':'25','39':'25.5','40':'26','41':'27','42':'28','43':'28.5','44':'29','45':'30','46':'30.5'};
let MV={list:[],i:0,prod:null,size:null};
function mediaFor(uid,ph){var m=MEDIA[uid];return (m&&m.length)?m:[{t:'photo',u:ph}];}
function ytEmbed(u){var m=u.match(/shorts\/([A-Za-z0-9_-]+)/)||u.match(/[?&]v=([A-Za-z0-9_-]+)/)||u.match(/youtu\.be\/([A-Za-z0-9_-]+)/);return m?('https://www.youtube.com/embed/'+m[1]):u;}
function poster(x){var p=MV.list.find(z=>z.t==='photo');return p?p.u:x.ph;}
function mRender(){var it=MV.list[MV.i],st=document.getElementById('mStage');
 if(it.t==='video'){if(/youtube|youtu\.be/.test(it.u))st.innerHTML='<iframe src="'+ytEmbed(it.u)+'" allow="autoplay; encrypted-media" allowfullscreen></iframe>';else st.innerHTML='<video src="'+it.u+'" controls playsinline></video>';}
 else st.innerHTML='<img src="'+it.u+'" alt="">';
 document.getElementById('mVbadge').style.display=(it.t==='video')?'block':'none';
 document.getElementById('mCount').textContent=(MV.i+1)+' / '+MV.list.length;
 document.querySelectorAll('#mThumbs button').forEach((b,k)=>b.classList.toggle('sel',k===MV.i));}
function mNav(d){MV.i=(MV.i+d+MV.list.length)%MV.list.length;mRender();}
function mThumb(k){MV.i=k;mRender();}
function mSel(s,btn){MV.size=s;document.querySelectorAll('#mSzs button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function openModal(i){var x=D[i];MV.prod=x;MV.list=mediaFor(x.uid,x.ph);MV.i=0;MV.size=(x.sz.length===1?x.sz[0]:null);
 document.getElementById('mEye').textContent='Розпродаж · −30%'+(x.nw?' · NEW':'');
 document.getElementById('mTitle').textContent=x.n;
 document.getElementById('mSku').textContent='SKU · '+String(x.uid).replace('sale-','');
 document.getElementById('mPcur').textContent=fmt(saleP(x.p))+' ₴';
 document.getElementById('mPold').textContent=fmt(x.p)+' ₴';
 document.getElementById('mThumbs').innerHTML=MV.list.map((m,k)=>'<button onclick="mThumb('+k+')"><img src="'+(m.t==='video'?poster(x):m.u)+'"></button>').join('');
 document.getElementById('mSzs').innerHTML=x.sz.map(s=>'<button onclick="mSel(\''+s+'\',this)" class="'+(MV.size===s?'sel':'')+'">'+s+'<small>'+(CM[s]||'')+'см</small></button>').join('');
 var _sold=SOLD.has(String(x.uid));var _b=document.getElementById('mBuy');_b.classList.toggle('sold',_sold);_b.disabled=_sold;_b.textContent=_sold?'ПРОДАНО':'В КОШИК';var ch=CHARS[x.uid]||CHARS['_default'];document.getElementById('mSpec').innerHTML=ch?('<div class="spec-h">Характеристики</div><ul>'+ch.c.map(t=>'<li>'+t+'</li>').join('')+'</ul><div class="spec-h">Матеріали</div><ul>'+ch.m.map(t=>'<li>'+t+'</li>').join('')+'</ul>'):'';mRender();document.getElementById('modal').classList.add('on');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modal').classList.remove('on');document.getElementById('mStage').innerHTML='';document.body.style.overflow='';}
function modalAdd(){var x=MV.prod;if(!x)return;if(SOLD.has(String(x.uid))){alert('Цю модель уже продано');return;}if(!MV.size){alert('Оберіть розмір');return;}
 var f=CART.find(c=>c.uid===x.uid&&c.size===MV.size);if(f)f.qty++;else CART.push({uid:x.uid,title:x.n,color_name:x.c,photo:x.ph,size:MV.size,price:saleP(x.p),qty:1});
 renderCart();closeModal();openCart();}
function selSz(i,s,btn){pick[i]=s;btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function addCart(i){
  const x=D[i], s=pick[i]|| (x.sz.length===1?x.sz[0]:null);
  if(!s){alert('Оберіть розмір');return;}
  const found=CART.find(c=>c.uid===x.uid&&c.size===s);
  if(found)found.qty++;
  else CART.push({uid:x.uid,title:x.n,color_name:x.c,photo:x.ph,size:s,price:saleP(x.p),qty:1});
  renderCart();openCart();
}
function rm(idx){CART.splice(idx,1);renderCart();}
function cnt(){return CART.reduce((s,c)=>s+c.qty,0);}
function total(){return CART.reduce((s,c)=>s+c.price*c.qty,0);}
function openCart(){document.getElementById('ov').classList.add('on');document.getElementById('drw').classList.add('on');}
function closeCart(){document.getElementById('ov').classList.remove('on');document.getElementById('drw').classList.remove('on');}
function renderCart(){
  document.getElementById('cnt').textContent=cnt();
  const list=document.getElementById('clist'), foot=document.getElementById('foot');
  if(!CART.length){list.innerHTML='<div class="empty">Кошик порожній</div>';foot.innerHTML='';return;}
  list.innerHTML=CART.map((c,i)=>`<div class="ci"><img src="${c.photo}"><div style="flex:1">
    <div class="t">${c.title}</div><div class="m">${c.color_name} · розмір ${c.size} · ${c.qty} шт</div>
    <button class="rm" onclick="rm(${i})">прибрати</button></div>
    <div class="p">${fmt(c.price*c.qty)} ₴</div></div>`).join('');
  foot.innerHTML=`<div class="row"><span>Разом</span><span>${fmt(total())} ₴</span></div>
    <div class="err" id="err"></div>
    <input id="fio" placeholder="Імʼя та прізвище" autocomplete="name">
    <input id="phone" placeholder="Телефон (+380...)" inputmode="tel" autocomplete="tel">
    <div class="ac"><input id="city" placeholder="Місто (Нова Пошта)" autocomplete="off"><div class="acbox" id="cityBox"></div></div>
    <div class="ac"><input id="wh" placeholder="Відділення / поштомат" autocomplete="off"><div class="acbox" id="whBox"></div></div>
    <div class="pm">
      <label><input type="radio" name="pm" value="card" checked><span>Картка онлайн</span></label>
      <label><input type="radio" name="pm" value="np"><span>Наложка (передпл. 200₴)</span></label>
    </div>
    <button class="go" id="go" onclick="checkout()">Оформити та оплатити</button>`;
  bindNP();
}
let cityRef='';
const deb=(fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};
async function npFetch(method,props){
  const r=await fetch(NP_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:NP_KEY,modelName:'AddressGeneral',calledMethod:method,methodProperties:props})});
  const d=await r.json();return d.success?(d.data||[]):[];
}
function bindNP(){
  const city=document.getElementById('city'),cityBox=document.getElementById('cityBox');
  const wh=document.getElementById('wh'),whBox=document.getElementById('whBox');
  city.addEventListener('input',deb(async()=>{
    cityRef='';wh.value='';
    if(city.value.trim().length<2){cityBox.style.display='none';return;}
    const r=await npFetch('searchSettlements',{CityName:city.value.trim(),Limit:8});
    const list=(r[0]&&r[0].Addresses)||[];
    cityBox.innerHTML=list.map(a=>`<div data-ref="${a.DeliveryCity||a.Ref}">${(a.Present||a.MainDescription)}</div>`).join('');
    cityBox.style.display=list.length?'block':'none';
    cityBox.querySelectorAll('div').forEach(el=>el.onclick=()=>{city.value=el.textContent;cityRef=el.dataset.ref;cityBox.style.display='none';});
  },300));
  wh.addEventListener('input',deb(async()=>{
    if(!cityRef||wh.value.trim().length<1){whBox.style.display='none';return;}
    const r=await npFetch('getWarehouses',{CityRef:cityRef,FindByString:wh.value.trim(),Limit:50});
    whBox.innerHTML=r.slice(0,30).map(w=>`<div>${w.Description}</div>`).join('');
    whBox.style.display=r.length?'block':'none';
    whBox.querySelectorAll('div').forEach(el=>el.onclick=()=>{wh.value=el.textContent;whBox.style.display='none';});
  },300));
}
async function checkout(){
  const err=document.getElementById('err'), go=document.getElementById('go');
  const fio=document.getElementById('fio').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const city=document.getElementById('city').value.trim();
  const wh=document.getElementById('wh').value.trim();
  const pm=document.querySelector('input[name=pm]:checked').value;
  err.textContent='';
  if(fio.length<2){err.textContent='Вкажіть імʼя';return;}
  if(phone.replace(/\D/g,'').length<10){err.textContent='Вкажіть телефон';return;}
  if(!city){err.textContent='Вкажіть місто';return;}
  if(!wh){err.textContent='Вкажіть відділення';return;}
  go.disabled=true;go.textContent='Надсилаю...';
  const num='ULT-'+Date.now().toString().slice(-8);
  const items=CART.map(c=>({uid:c.uid,title:c.title,photo:c.photo,color_name:c.color_name,size:c.size,price:c.price,qty:c.qty,promo_pct:SALE_PCT,family:'SALE',saleItem:true}));
  try{
    const or=await fetch('/api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      num,stage:'final',fio,phone,city,wh,payment:pm,total:total(),items
    })});
    const ores=await or.json().catch(()=>({}));
    if(!or.ok||ores.ok===false)throw new Error(ores.error||ores.message||('HTTP '+or.status));
    try{if(typeof ttq!=='undefined'&&ttq&&typeof ttq.track==='function'){ttq.track('CompletePayment',{contents:CART.map(function(c){return {content_id:String(c.uid),content_type:'product',content_name:c.title||''};}),content_type:'product',value:total(),currency:'UAH'},{event_id:num});}}catch(_t){}
    const fioP=fio.split(/\s+/);
    const wfp=await fetch('/api/wayforpay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      orderReference:num,
      items:CART.map(c=>({uid:String(c.uid),qty:Number(c.qty),promo_pct:SALE_PCT})),
      amount:total(),
      products:CART.map(c=>({name:c.title,count:c.qty,price:c.price})),
      paymentMode:(pm==='np'?'cod':'card'),
      clientFirstName:fioP[0]||'',clientLastName:fioP.slice(1).join(' ')||'',clientEmail:'',clientPhone:phone
    })});
    const w=await wfp.json().catch(()=>({}));
    if(wfp.ok&&w.ok&&w.formHtml){document.open();document.write(w.formHtml);document.close();return;}
    err.textContent='Замовлення прийнято. Менеджер звʼяжеться для оплати.';
    go.textContent='Готово';
  }catch(e){
    err.textContent='Помилка: '+e.message;
    go.disabled=false;go.textContent='Оформити та оплатити';
  }
}
renderCart();
function loadSold(){fetch('https://fsihlzzjewhxpogvjapu.supabase.co/rest/v1/ulhome_settings?key=eq.sale_sold_uids&select=value',{headers:{apikey:ANON,Authorization:'Bearer '+ANON}}).then(r=>r.json()).then(rows=>{var arr=(rows&&rows[0]&&rows[0].value)||[];SOLD=new Set(arr.map(String));buildGrid();}).catch(()=>{});}
loadSold();

/* deeplink router: /sale.html?p=<uid> opens the product modal (used by the FB sale feed) */
(function(){
  var _open=openModal,_close=closeModal;
  openModal=function(i){_open(i);try{var u=D[i]&&D[i].uid;if(u)history.replaceState(null,'','?p='+encodeURIComponent(u));}catch(e){}};
  closeModal=function(){_close();try{history.replaceState(null,'',location.pathname);}catch(e){}};
  function openByUid(u){if(!u)return;var i=D.findIndex(function(x){return String(x.uid)===String(u);});if(i>=0)openModal(i);}
  openByUid(new URLSearchParams(location.search).get('p'));
  window.addEventListener('popstate',function(){var u=new URLSearchParams(location.search).get('p');if(u)openByUid(u);else _close();});
})();
